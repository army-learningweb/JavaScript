<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <style>
        ul {
            display: flex;
            justify-content: space-between;
            /* border: 1px solid black; */
            width: 420px;
            margin: 0;
            padding: 0;
            list-style: none;
        }

        ul>li>a {
            width: 200px;
            display: inline-block;
        }

        ul li a img {
            max-width: 100%;
            height: auto;
            transition: 0.3s;

        }

        ul li a img:hover {
            border: 1px solid red;
        }
    </style>
    <ul>
        <li>
            <a href="#">
                <img src="images/libazz-fashion-bag-1.jpeg" data-src-v1="images/libazz-fashion-bag-1.jpeg"
                    data-src-v2="images/libazz-fashion-bag-2.jpeg">
            </a>
        </li>
        <li>
            <a href="#">
                <img src="images/libazz-fashion-jacket-1.jpeg" data-src-v1="images/libazz-fashion-jacket-1.jpeg"
                    data-src-v2="images/libazz-fashion-jacket-2.jpeg">
            </a>
        </li>
    </ul>

    <script>
        const imgEle = document.querySelectorAll('img');
        for (let item of imgEle) {
            item.addEventListener('mouseover', function () {
                this.src = this.dataset.srcV2;
            });
            item.addEventListener('mouseout', function () {
                this.src = this.dataset.srcV1;
            });
        }
    </script>

</body>

</html>
