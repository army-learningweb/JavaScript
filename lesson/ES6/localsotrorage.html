<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        let data = [
            {
                id: 1,
                name: 'luuducvy',
                age: 27
            }
        ]

        localStorage.setItem('userinfo',JSON.stringify(data));
        let data_out = JSON.parse(localStorage.getItem('userinfo'));

        console.log(data_out);

        for(let value of data_out){
            console.log(value.age);
        }
        
    </script>
</body>

</html>
