<body>
    <script>

        // Xử lý tham số nâng cao truyền ngẫu nhiên không cố định

        function sum(...number_random) {
            let total = 0;
            for (number of number_random) {
               total += number;
            }
            return total;
        }

       console.log(sum(1,2,3,4,5));
    </script>
