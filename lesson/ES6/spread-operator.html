<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        
        // spread operator for array
        let array = [1,2,3]
        let new_array = [...array,4,5,6] // Tạo mảng mới và kế thừa mảng cũ + thêm pt mới
        let new_array_2 = [...array,...new_array]; // Kết hợp mảng
        console.log(new_array_2);

        // spread operator for string
        let string = 'luuducvy'
        let array_string = [...string];
        console.log(array_string);

    </script>
</body>
</html>
