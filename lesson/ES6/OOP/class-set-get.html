    <script>
        class User {
            constructor(fullname,age,gender){
                this.fullname = fullname;
                this.age = age;
                this.gender = gender
            }
            
            set setFullname(fullname){
                this.fullname = fullname;
            }

            get getFullname(){
                return this.fullname;
            }
        }

        let user_info = new User ('luuducvy',27,'male');
        user_info.setFullname = 'ducvy';
        console.log(user_info);
    </script>
