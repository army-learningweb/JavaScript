<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>

        // Vòng lặp
        // for in truy xuất qua từng key của mảng

        // for in với object
        let person = {
            name:'vy',
            year:1999
        };

        for (let key in person){
            console.log(person[key]);
        }

        // for in với mảng
        let array = ['red','green','black'];

        for (let key in array){
            console.log(array[key]);
        }
    </script>
</body>
</html>
