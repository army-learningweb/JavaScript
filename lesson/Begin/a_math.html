<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        
        // Phép toán trong js
        let a = 2;
        let b = 3;

        let plus_total = a + b;
        let minus_total = a - b;
        let multi_total = a * b;
        let division_total = a / b;

        // Mũ
        let exponan_total = a ** b;

        // Chia lấy dư
        let modulo_total = a % b;

        console.log(plus_total);
        console.log(minus_total);
        console.log(multi_total);
        console.log(division_total);
        console.log(exponan_total);
        console.log(modulo_total);


    </script>
</body>

</html>
