<body>
    <h1>Xóa hoặc thêm phần tử với splice</h1>

    <script>

        // Xóa hoặc thêm phần tử với splice

        let list_colors = ['red','blue','green'];
        list_colors.forEach((element,index,arr) => {
            console.log(arr);
        });

        // 1 tham số -> xóa
        // 2 tham số -> xóa từ 2, 0 -> tức không xóa phần tử nào
        // 3 tham số -> thêm tham số black vào

        list_colors.splice(2,0,'black');

        // console.log(list_colors);


    </script>
</body>
