<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>

        let number = [1,2,3,4,5];
        
        number.push(6); // Thêm vào cuối
        number.unshift(0); // Thêm vào đầu

        number.pop(6); // Xóa đầu
        number.shift(0); // Xóa cuối

        let fruit = ['a','b','c'];
        fruit.shift('c');
        
        console.log(fruit);



    </script>
</body>
</html>
