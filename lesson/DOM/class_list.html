<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="demo" class="open"></div>

    <script>
        const demoEle = document.querySelector('#demo');
        demoEle.classList.add('open2'); // them class
        demoEle.classList.remove('open2'); // xoa class
        demoEle.classList.replace('open','remove'); // thay the class
        demoEle.classList.toggle('show'); // che do bat tat class
        console.log(demoEle);
    </script>
</body>
</html>
