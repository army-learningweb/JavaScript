<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- inline -->
    <h1 onmouseover="console.log('aaaa');" onmouseout="console.log('bbbb');">inline</h1>

    <!-- js event -->
    <a href="" id="hover" style="padding:5px;background-color: purple;">Hover me</a>
    <script>
        const aElement = document.querySelector('#hover');
        aElement.addEventListener('mouseover',function(){
            console.log('aaaa');
        })

        aElement.addEventListener('mouseout',function(){
            console.log('bbbb');
        })
    </script>
</body>
</html>
