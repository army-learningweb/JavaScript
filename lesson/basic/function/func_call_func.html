<body>
    <script>

        function check_even(n) {
            if (n % 2 == 0) {
                return n;
            }
            return false;
        };

        function total_even(k) {
            let t = 0;
            for(let i = 1; i <= k; i++){
                if(check_even(i)){
                    t += i;
                };
            };
            return t;
        }

        console.log(total_even(5));













    </script>
</body>
